id: disable_usb_ports
name: Disable USB ports
version: '1.0'
description: A technique to disable usb ports on both Linux and Windows.
documentation: |-
  This technique can be used for Linux and Windows systems.

  For Linux, the modules *usbstorage* and *uas* are blacklisted using the /etc/modprobe.d/blacklist-usb-storage.conf.

  For Windows, the registry entry HKLM:\HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Services\USBSTOR is used.
  A reboot of the Windows system is necessary for the change to be effective. A generic method *Command Execution* can be added to reboot automatically the systems.
category: ncf_techniques
items:
  - id: 136c768d-1dee-40df-852e-91d42f4a693d
    name: For Linux
    reporting:
      mode: weighted
    condition: linux
    items:
      - id: 074b5455-6008-44c0-baa4-5f2a45b91856
        name: blacklist-usb-storage.conf file present
        method: file_present
        params:
          path: /etc/modprobe.d/blacklist-usb-storage.conf
      - id: 3ddeaaf7-59ee-475f-9498-1892cd8fa8b6
        name: Blacklist modules in file /etc/modprobe.d/blacklist-usb-storage.conf
        method: file_lines_present
        params:
          path: /etc/modprobe.d/blacklist-usb-storage.conf
          lines: |-
            blacklist usb_storage
            blacklist uas
  - id: 6e2fce58-6895-42e2-a3a1-748e018b97c6
    name: for Windows
    reporting:
      mode: weighted
    condition: windows
    items:
      - id: 58cc0423-d41d-43d0-8ef8-27bb9d261174
        name: HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Services\USBSTOR
        method: registry_entry_present
        params:
          key: Configure registry key HKLM:\HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Services\USBSTOR
          entry: Start
          value: '4'
          registryType: Dword
      - id: aee6987b-860a-4bb8-9ce0-9393f135cec4
        name: Stop USBSTOR service
        method: powershell_execution
        params:
          command: Stop-Service USBSTOR
          successRegex: ''
          repairedRegex: ''
